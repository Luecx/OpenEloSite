{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <form class="form-card" method="post" action="/auth/password-reset/{{ token }}">
      <h1>{{ tr("Neues Passwort setzen") }}</h1>
      <label>
        <span>{{ tr("Neues Passwort") }}</span>
        <input type="password" name="password" required />
      </label>
      <button class="button" type="submit">{{ tr("Passwort speichern") }}</button>
    </form>
  </section>
{% endblock %}
