{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <form class="form-card" method="post" action="/auth/login">
      <h1>{{ tr("Login") }}</h1>
      <label>
        <span>{{ tr("Benutzername oder E-Mail") }}</span>
        <input type="text" name="login" autocomplete="username" required />
      </label>
      <label>
        <span>{{ tr("Passwort") }}</span>
        <input type="password" name="password" required />
      </label>
      <button class="button auth-submit" type="submit">{{ tr("Einloggen") }}</button>
      <p class="muted"><a href="/auth/password-reset">{{ tr("Passwort vergessen?") }}</a></p>
    </form>
  </section>
{% endblock %}
