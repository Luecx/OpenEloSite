{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <form class="form-card" method="post" action="/auth/password-reset">
      <h1>{{ tr("Passwort zuruecksetzen") }}</h1>
      <label>
        <span>{{ tr("E-Mail") }}</span>
        <input type="email" name="email" required />
      </label>
      <button class="button" type="submit">{{ tr("Reset-Token erzeugen") }}</button>
      {% if reset_token %}
        <div class="token-box">
          <p>{{ tr("Lokales Demo-Token:") }}</p>
          <code>{{ reset_token }}</code>
          <p><a href="/auth/password-reset/{{ reset_token }}">{{ tr("Zum Formular") }}</a></p>
        </div>
      {% endif %}
    </form>
  </section>
{% endblock %}
